name: Build KidsFinance Pro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm installieren
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Abhängigkeiten installieren
        run: pnpm install --no-frozen-lockfile

      - name: Electron installieren
        run: pnpm add -D electron@28 electron-builder@24

      - name: React-App bauen
        run: pnpm run build

      - name: package.json und electron-main.js fixen
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.main = "electron-main.js"
          $pkg.PSObject.Properties.Remove("type")
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json
          $code = 'const{app,BrowserWindow,ipcMain}=require("electron");const path=require("path");let w;function c(){w=new BrowserWindow({width:1200,height:800,webPreferences:{nodeIntegration:false,contextIsolation:true}});const f=path.join(app.getAppPath(),"dist","public","index.html");w.loadFile(f);w.on("closed",()=>{w=null})}app.on("ready",c);app.on("window-all-closed",()=>{if(process.platform!=="darwin")app.quit()});app.on("activate",()=>{if(!w)c()});'
          Set-Content -Path electron-main.js -Value $code

      - name: Windows Installer bauen
        run: npx electron-builder --win --publish never

      - name: Installer hochladen
        uses: actions/upload-artifact@v4
        with:
          name: KidsFinance-Pro-Windows-Installer
          path: dist-electron/*.exe
          retention-days: 30
