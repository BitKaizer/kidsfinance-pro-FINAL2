name: Build KidsFinance Pro

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Code herunterladen
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm installieren
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Abhängigkeiten installieren
        run: pnpm install --no-frozen-lockfile

      - name: Electron installieren
        run: pnpm add -D electron@28 electron-builder@24

      - name: React-App bauen
        run: pnpm run build

      - name: package.json fixen
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.main = "electron-main.js"
          $pkg.PSObject.Properties.Remove("type")
          $pkg | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: electron-main.js erstellen
        shell: pwsh
        run: |
          $content = @'
          const { app, BrowserWindow, ipcMain } = require('electron');
          const path = require('path');
          let mainWindow;
          function createWindow() {
            mainWindow = new BrowserWindow({
              width: 1200, height: 800,
              webPreferences: { nodeIntegration: false, contextIsolation: true }
            });
            mainWindow.loadFile(path.join(__dirname, 'dist', 'public', 'index.html'));
            mainWindow.on('closed', () => { mainWindow = null; });
          }
          app.on('ready', createWindow);
          app.on('window-all-closed', () => { if (process.platform !== 'darwin') app.quit(); });
          app.on('activate', () => { if (!mainWindow) createWindow(); });
          '@
          Set-Content -Path electron-main.js -Value $content

      - name: Windows Installer bauen
        run: npx electron-builder --win --publish never

      - name: Installer hochladen
        uses: actions/upload-artifact@v4
        with:
          name: KidsFinance-Pro-Windows-Installer
          path: dist-electron/*.exe
          retention-days: 30
